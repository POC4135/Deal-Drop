name: Deploy Flutter Web to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile_flutter
        run: flutter pub get

      - name: Build web
        working-directory: apps/mobile_flutter
        run: |
          flutter build web --release \
            --dart-define=DEALDROP_API_BASE_URL=${{ vars.DEALDROP_API_BASE_URL }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }} \
            --dart-define=GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Copy Vercel config into build output
        run: cp apps/mobile_flutter/vercel.json apps/mobile_flutter/build/web/vercel.json

      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          vercel deploy apps/mobile_flutter/build/web \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
